name: Build Mac App
on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System and Pip Dependencies
        run: |
          pip install customtkinter pynput pyautogui pyinstaller

      - name: Compile Script to Standalone Mac App
        run: |
          pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter "PyAutoGen for mac.py"

      - name: Compress and Zip the App Bundle
        run: |
          cd dist
          zip -r PyAutoGen-Mac.zip "PyAutoGen for mac.app"

      - name: Upload Finished App to Browser
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Executable
          path: dist/PyAutoGen-Mac.zip
